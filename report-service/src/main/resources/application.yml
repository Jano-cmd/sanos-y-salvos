server:
  port: 8084

spring:
  application:
    name: report-service
  datasource:
    url: jdbc:h2:mem:reportdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

# Optional: Actuator configuration for monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info